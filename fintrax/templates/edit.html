<!DOCTYPE html>
<html>

<head>

<title>Edit Transaksi</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

header{
background:black;
color:white;
padding:20px;
font-size:28px;
text-align:center;
}

.card{
border:none;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.container{
margin-top:30px;
max-width:800px;
}

</style>

</head>

<body>

<header>
Fintrax - Personal Finance Tracker
</header>

<div class="container">

<div class="card p-4">

<h4 class="mb-4 text-center">Edit Transaksi</h4>

<form method="POST" action="/update/{{t['id']}}">

<div class="row mb-3">

<div class="col-md-3">
<label>Tanggal</label>
<input type="date" name="tanggal" class="form-control" value="{{t['tanggal']}}" required>
</div>

<div class="col-md-3">
<label>Deskripsi</label>
<input name="deskripsi" class="form-control" value="{{t['deskripsi']}}" required>
</div>

<div class="col-md-3">
<label>Jumlah</label>
<input type="number" name="jumlah" class="form-control" value="{{t['jumlah']}}" required>
</div>

<div class="col-md-3">
<label>Jenis</label>

<select name="jenis" class="form-control">

<option value="pemasukan" {% if t["jenis"]=="pemasukan" %}selected{% endif %}>
Pemasukan
</option>

<option value="pengeluaran" {% if t["jenis"]=="pengeluaran" %}selected{% endif %}>
Pengeluaran
</option>

</select>

</div>

</div>

<div class="d-flex justify-content-between">

<a href="/" class="btn btn-secondary">
Kembali
</a>

<button class="btn btn-primary">
Update Transaksi
</button>

</div>

</form>

</div>

</div>

</body>
</html>
